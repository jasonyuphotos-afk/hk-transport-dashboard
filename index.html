<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>QR Cards</title>
  
  <!-- 👇 Icon 設定 -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <!-- SortableJS 拖曳排序庫 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  
  <style>
    body {
      background: radial-gradient(circle at 30% 10%, #1e293b, #0f172a 80%);
      color: #f8fafc;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 20px);
    }
    
    .header-wrapper {
      padding-top: var(--safe-top);
    }
    
    header {
      padding-top: 0.75rem !important;
      padding-bottom: 0.75rem !important;
    }
    
    nav {
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)) !important;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
      transition: all 0.2s ease;
    }
    
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.6), inset 0 0 25px rgba(255,255,255,0.08);
    }

    .modal-glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
    }

    ::-webkit-scrollbar { display: none; }

    /* 拖曳時嘅樣式 */
    .sortable-ghost {
      opacity: 0.4;
      transform: scale(0.95);
      border: 2px dashed rgba(56, 189, 248, 0.5) !important;
    }
    .sortable-chosen {
      box-shadow: 0 20px 40px -10px rgba(56, 189, 248, 0.3) !important;
      border-color: rgba(56, 189, 248, 0.6) !important;
      z-index: 30 !important;
    }
    
    /* 編輯模式提示 */
    .edit-mode-hint {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* 🔧 修復單張卡上下太長 + Grid 排列 */
    .card-grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      grid-auto-rows: min-content;
      align-content: start;
    }
    .card-grid .card-item {
      max-width: 100%;
      max-height: 160px;
    }

    /* 🔧 QR Modal 右上角按鈕間距 */
    .modal-top-buttons {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    .modal-top-btn {
      width: 2rem;
      height: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .modal-top-btn:active {
      transform: scale(0.9);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      0% { transform: scale(0.92) translateY(15px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-active {
      animation: fadeIn 0.25s ease-out forwards;
      display: flex !important;
    }
    .modal-active > div {
      animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .card-item {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .active-scale:active {
      transform: scale(0.94);
      transition: transform 0.1s ease;
    }
    .smooth-transition {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
    }
  </style>
</head>
<body class="pb-24">

  <!-- Header Wrapper -->
  <div class="header-wrapper sticky top-0 z-20">
    <header class="glass-card flex justify-between items-center mx-4 rounded-3xl smooth-transition px-5">
      <h1 class="text-xl font-bold text-white/90 drop-shadow-lg">QR Cards</h1>
      <div class="flex items-center gap-2">
        <button id="editModeBtn" onclick="toggleEditMode()" class="text-xs bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/20 text-white/70 shadow-lg active-scale smooth-transition hover:bg-white/20">
          ✏️ 編輯排序
        </button>
        <div id="statsChip" class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold text-white/80 border border-white/20 shadow-lg">🪪 0 | 🍽️ 0</div>
        <button onclick="openModal('settingsModal')" class="text-lg bg-white/10 backdrop-blur-md p-2 rounded-full border border-white/20 shadow-lg active-scale smooth-transition hover:bg-white/20">⚙️</button>
      </div>
    </header>
  </div>

  <!-- 編輯模式提示 -->
  <div id="editModeHint" class="px-5 py-2 hidden">
    <div class="edit-mode-hint text-xs text-sky-300/70 text-center bg-sky-500/5 rounded-xl py-2 border border-sky-500/20">
      🖐️ 長按拖曳卡片即可排序 · 點擊「完成」儲存
    </div>
  </div>

  <!-- 卡片列表區域 -->
  <main id="cardList" class="px-5 py-2 card-grid flex-1 overflow-y-auto"></main>

  <!-- 底部創作訊息 -->
  <div class="text-center py-3 pb-20 text-xs text-white/30 font-light tracking-wider">
    Created by Jason | Version 1.0
  </div>

  <!-- 底部導航欄 -->
  <nav class="fixed bottom-0 w-full glass-card pb-8 pt-4 px-8 flex justify-around items-center rounded-t-[2.5rem] border-b-0">
    <button onclick="renderList('card')" class="flex flex-col items-center text-white/70 hover:text-sky-300 active-scale smooth-transition">
      <span class="text-2xl mb-1 drop-shadow">🪪</span><span class="text-[10px] font-semibold">會員卡</span>
    </button>
    <button onclick="openAddModal()" class="bg-gradient-to-br from-sky-400 to-blue-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-[0_10px_25px_rgba(14,165,233,0.5)] transform -translate-y-5 active-scale smooth-transition border border-white/30">
      +
    </button>
    <button onclick="renderList('order')" class="flex flex-col items-center text-white/70 hover:text-orange-300 active-scale smooth-transition">
      <span class="text-2xl mb-1 drop-shadow">🍽️</span><span class="text-[10px] font-semibold">餐廳落單</span>
    </button>
  </nav>

  <!-- 設定 Modal -->
  <div id="settingsModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center p-6" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
    <div class="modal-glass w-full max-w-sm rounded-3xl p-6 relative">
      <button onclick="closeModal('settingsModal')" class="absolute top-4 right-4 w-8 h-8 bg-white/10 rounded-full flex items-center justify-center active-scale text-white">✕</button>
      <h2 class="text-xl font-bold mb-6 text-white">設定與備份</h2>
      <div class="space-y-3">
        <button onclick="exportBackup()" class="w-full bg-white/10 hover:bg-white/20 py-3.5 rounded-xl flex items-center justify-center gap-2 active-scale smooth-transition text-white font-medium border border-white/20">📤 匯出備份 (JSON)</button>
        <label class="w-full bg-white/10 hover:bg-white/20 py-3.5 rounded-xl flex items-center justify-center gap-2 cursor-pointer active-scale smooth-transition text-white font-medium border border-white/20">
          📥 從檔案匯入<input type="file" accept=".json" class="hidden" onchange="importBackup(event)">
        </label>
        <button onclick="clearAllData()" class="w-full mt-4 bg-red-500/20 text-red-300 py-3.5 rounded-xl flex items-center justify-center gap-2 active-scale smooth-transition border border-red-500/30">🗑️ 清除全部資料</button>
      </div>
    </div>
  </div>

  <!-- QR 展示 Modal -->
  <div id="qrModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center p-6" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
    <div class="modal-glass w-full max-w-sm rounded-3xl p-6 relative">
      <!-- 🔧 右上角按鈕組：關閉 + 編輯，分開擺 -->
      <div class="modal-top-buttons">
        <button onclick="editCurrentCard()" class="modal-top-btn" title="編輯">✏️</button>
        <button onclick="closeModal('qrModal')" class="modal-top-btn" title="關閉">✕</button>
      </div>
      
      <div class="flex items-center gap-4 mb-5 mt-2">
        <div id="modalIcon" class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center text-3xl overflow-hidden shadow-inner border border-white/20"></div>
        <div class="overflow-hidden flex-1">
          <div id="modalType" class="text-xs font-bold text-sky-300 uppercase tracking-wider">會員卡</div>
          <h2 id="modalName" class="text-xl font-bold text-white truncate">名稱</h2>
          <p id="modalNumber" class="text-sm text-white/60 truncate">編號</p>
        </div>
      </div>
      <div class="bg-white p-4 rounded-2xl flex justify-center items-center min-h-[220px] shadow-2xl" id="qrcodeContainer">
        <div id="qrcode" class="transition-opacity duration-300"></div>
      </div>
      <div id="modalData" class="mt-4 bg-black/20 p-3 rounded-xl text-xs font-mono text-white/70 text-center break-all border border-white/10"></div>
      <div class="mt-4 flex gap-2">
        <button id="safariBtn" class="w-full bg-white/10 py-3 rounded-xl text-sm font-bold hidden active-scale text-white border border-white/20">🌐 開啟網址</button>
        <button id="deleteBtn" class="w-full bg-red-500/20 text-red-300 py-3 rounded-xl text-sm font-bold active-scale border border-red-500/30">🗑️ 刪除</button>
      </div>
    </div>
  </div>

  <!-- 新增 / 編輯 Modal (共用) -->
  <div id="addModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-end p-4" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
    <div class="modal-glass w-full max-w-md rounded-3xl p-6 relative mb-4 max-h-[85vh] overflow-y-auto border border-white/20">
      <button onclick="closeAddModal()" class="absolute top-4 right-4 w-8 h-8 bg-white/10 rounded-full flex items-center justify-center active-scale text-white">✕</button>
      <h2 id="addModalTitle" class="text-xl font-bold mb-5 text-white">✨ 新增項目</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-white/60 mb-1">類型</label>
          <select id="addType" class="w-full bg-white/5 border border-white/20 rounded-xl p-3 text-white outline-none focus:border-sky-400 smooth-transition"><option value="card">🪪 會員卡</option><option value="order">🍽️ 餐廳落單</option></select>
        </div>
        <div>
          <label class="block text-xs font-bold text-white/60 mb-1">名稱</label>
          <input type="text" id="addName" placeholder="例如：百佳易賞錢" class="w-full bg-white/5 border border-white/20 rounded-xl p-3 text-white outline-none focus:border-sky-400 smooth-transition placeholder-white/30">
        </div>
        <div>
          <label class="block text-xs font-bold text-white/60 mb-1">自訂 Icon</label>
          <div class="flex items-center gap-3">
            <div id="iconPreview" class="w-12 h-12 bg-white/5 border border-white/20 rounded-xl flex items-center justify-center overflow-hidden"><span class="text-xs text-white/40">無</span></div>
            <label class="bg-white/10 px-4 py-2 rounded-xl text-sm cursor-pointer hover:bg-white/20 active-scale smooth-transition text-white">揀圖片<input type="file" accept="image/*" class="hidden" onchange="processIconUpload(event)"></label>
            <button onclick="clearIcon()" class="text-sm text-white/50 underline active:text-white">清除</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-white/60 mb-1 flex justify-between">
            <span>QR 內容或網址</span>
            <label class="text-sky-300 cursor-pointer active:opacity-70">📷 掃描圖片 QR<input type="file" accept="image/*" class="hidden" onchange="scanQRFromImage(event)"></label>
          </label>
          <textarea id="addData" rows="2" placeholder="手動輸入或掃描圖片" class="w-full bg-white/5 border border-white/20 rounded-xl p-3 text-white outline-none focus:border-sky-400 smooth-transition placeholder-white/30"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-sky-300 mb-1">編號 (自動提取)</label>
          <input type="text" id="addNumber" class="w-full bg-sky-900/20 border border-sky-500/30 rounded-xl p-3 text-white outline-none focus:border-sky-400 smooth-transition shadow-[0_0_15px_rgba(14,165,233,0.2)]">
        </div>
        <button id="saveCardBtn" onclick="saveCard()" class="w-full bg-gradient-to-r from-sky-400 to-blue-500 text-white font-bold py-4 rounded-xl mt-2 active-scale shadow-lg shadow-sky-500/30 smooth-transition border border-white/20">儲存</button>
      </div>
    </div>
  </div>

  <canvas id="qrCanvas" class="hidden"></canvas>

  <script>
    (function() {
      let cards = JSON.parse(localStorage.getItem('myWalletCards')) || [];
      let currentFilter = 'card';
      let currentBase64Icon = null;
      let isEditMode = false;
      let sortableInstance = null;
      let editingCardId = null;
      let currentViewingCardId = null;

      cards.forEach((card, index) => {
        if (card.order === undefined) card.order = index;
      });

      function saveCards() {
        try { localStorage.setItem('myWalletCards', JSON.stringify(cards)); updateStats(); } 
        catch (e) { alert('儲存失敗！可能圖片太大，請清理部分項目。'); }
      }

      function updateStats() {
        const members = cards.filter(c => c.type === 'card').length;
        const orders = cards.filter(c => c.type === 'order').length;
        document.getElementById('statsChip').innerText = `🪪 ${members} | 🍽️ ${orders}`;
      }

      function getEmoji(name) {
        const emojis = ['🛒','☕','🍔','✈️','🏪','💊','👗','🎮','📚','🏋️','💳'];
        if (!name) return '💳';
        let hash = 0;
        for (let i = 0; i < name.length; i++) { hash = ((hash << 5) - hash) + name.charCodeAt(i); hash |= 0; }
        return emojis[Math.abs(hash) % emojis.length];
      }

      window.toggleEditMode = function() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('editModeBtn');
        const hint = document.getElementById('editModeHint');
        
        if (isEditMode) {
          btn.innerHTML = '✅ 完成';
          btn.classList.add('bg-sky-500/30', 'border-sky-500/50', 'text-sky-300');
          hint.classList.remove('hidden');
        } else {
          btn.innerHTML = '✏️ 編輯排序';
          btn.classList.remove('bg-sky-500/30', 'border-sky-500/50', 'text-sky-300');
          hint.classList.add('hidden');
        }
        
        renderList();
      };

      function initSortable() {
        const list = document.getElementById('cardList');
        if (sortableInstance) sortableInstance.destroy();
        
        if (isEditMode && list.children.length > 1) {
          sortableInstance = new Sortable(list, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            delay: 200,
            delayOnTouchOnly: true,
            onEnd: function(evt) {
              const oldIndex = evt.oldIndex;
              const newIndex = evt.newIndex;
              
              const filtered = cards.filter(c => c.type === currentFilter);
              const sorted = [...filtered].sort((a, b) => (a.order || 0) - (b.order || 0));
              
              const [movedItem] = sorted.splice(oldIndex, 1);
              sorted.splice(newIndex, 0, movedItem);
              
              const allCards = [...cards];
              sorted.forEach((item, index) => {
                const cardIndex = allCards.findIndex(c => c.id === item.id);
                if (cardIndex !== -1) allCards[cardIndex].order = index;
              });
              
              cards = allCards;
              saveCards();
            }
          });
        }
      }

      window.renderList = function(typeFilter = currentFilter) {
        currentFilter = typeFilter;
        const list = document.getElementById('cardList');
        
        if (sortableInstance) {
          sortableInstance.destroy();
          sortableInstance = null;
        }
        
        list.innerHTML = '';
        const filtered = cards.filter(c => c.type === typeFilter);
        const sorted = [...filtered].sort((a, b) => (a.order || 0) - (b.order || 0));
        
        if (sorted.length === 0) {
          list.className = 'px-5 py-2 flex-1 overflow-y-auto';
          list.style.gridTemplateColumns = '';
          list.innerHTML = `<div class="flex flex-col items-center justify-center mt-24 opacity-60 card-item"><span class="text-5xl mb-4">✨</span><p class="text-white/70 text-lg">暫無項目</p></div>`;
        } else {
          list.className = 'px-5 py-2 card-grid flex-1 overflow-y-auto';
          
          sorted.forEach((card, index) => {
            const isUrl = card.data && card.data.match(/^https?:\/\//i);
            const iconHtml = card.iconBase64 
              ? `<img src="${card.iconBase64}" class="w-full h-full object-cover">`
              : getEmoji(card.name);

            const delay = index * 0.05;
            const cardHtml = `
              <div data-id="${card.id}" style="animation-delay: ${delay}s" class="card-item glass-card rounded-2xl p-3 flex flex-col items-center gap-2 ${isEditMode ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer active-scale'} smooth-transition text-center relative">
                ${isEditMode ? '<div class="absolute top-1.5 left-1.5 text-[10px] text-white/30">⠿</div>' : ''}
                ${isEditMode ? `<button onclick="event.stopPropagation(); editCardById('${card.id}')" class="absolute top-1.5 right-1.5 w-5 h-5 bg-white/10 rounded-full flex items-center justify-center text-[9px] active-scale text-white/50 hover:text-white/80 hover:bg-white/20">✏️</button>` : ''}
                <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center text-2xl overflow-hidden shadow-inner border border-white/20 shrink-0 mt-1" ${!isEditMode ? `onclick="showCard('${card.id}')"` : ''}>
                  ${iconHtml}
                </div>
                <div class="w-full overflow-hidden" ${!isEditMode ? `onclick="showCard('${card.id}')"` : ''}>
                  <h3 class="font-bold text-sm truncate text-white/90">${card.name}</h3>
                  <p class="text-[10px] text-white/50 truncate">${card.number || (isUrl ? '🌐 網址' : '🔣 ' + card.data.substring(0, 12))}</p>
                </div>
              </div>
            `;
            list.insertAdjacentHTML('beforeend', cardHtml);
          });
          
          if (isEditMode) {
            initSortable();
          }
        }
        updateStats();
      };

      window.editCurrentCard = function() {
        if (!currentViewingCardId) return;
        editCardById(currentViewingCardId);
        closeModal('qrModal');
      };

      window.editCardById = function(id) {
        const card = cards.find(c => c.id === id);
        if (!card) return;
        
        editingCardId = id;
        document.getElementById('addModalTitle').innerText = '✏️ 編輯項目';
        document.getElementById('saveCardBtn').innerText = '更新';
        document.getElementById('addType').value = card.type;
        document.getElementById('addName').value = card.name;
        document.getElementById('addNumber').value = card.number || '';
        document.getElementById('addData').value = card.data;
        
        if (card.iconBase64) {
          currentBase64Icon = card.iconBase64;
          document.getElementById('iconPreview').innerHTML = `<img src="${card.iconBase64}" class="w-full h-full object-cover">`;
        } else {
          currentBase64Icon = null;
          document.getElementById('iconPreview').innerHTML = `<span class="text-xs text-white/40">無</span>`;
        }
        
        openModal('addModal');
      };

      window.processIconUpload = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 150; canvas.width = size; canvas.height = size;
            const min = Math.min(img.width, img.height);
            const sx = (img.width - min) / 2; const sy = (img.height - min) / 2;
            ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
            currentBase64Icon = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('iconPreview').innerHTML = `<img src="${currentBase64Icon}" class="w-full h-full object-cover">`;
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        event.target.value = '';
      };

      window.clearIcon = function() {
        currentBase64Icon = null;
        document.getElementById('iconPreview').innerHTML = `<span class="text-xs text-white/40">無</span>`;
      };

      window.exportBackup = function() {
        if (cards.length === 0) return alert('無資料可以匯出。');
        const dataStr = JSON.stringify(cards, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `QR Cards 備份_${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        closeModal('settingsModal');
      };

      window.importBackup = function(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const imported = JSON.parse(e.target.result);
            if (!Array.isArray(imported)) throw new Error("格式錯誤");
            if(confirm(`讀取 ${imported.length} 個項目，覆蓋現有資料？`)) {
              cards = imported;
              cards.forEach((card, index) => {
                if (card.order === undefined) card.order = index;
              });
              saveCards(); renderList(); closeModal('settingsModal');
            }
          } catch (err) { alert('❌ 讀取失敗，請確認係正確備份檔。'); }
        };
        reader.readAsText(file); event.target.value = '';
      };

      window.clearAllData = function() {
        if(confirm('⚠️ 確定清除全部資料？無法復原！')) {
          cards = []; saveCards(); renderList(); closeModal('settingsModal');
        }
      };

      function extractNumber(data) {
        if (!data) return '';
        const patterns = [
          /(\d{4}[\s\-]?\d{4}[\s\-]?\d{4}[\s\-]?\d{4})/,
          /(?:會員號碼|會員編號|Member\s*ID|Card\s*No|卡號|編號)[:\s]*([A-Za-z0-9\-\s]{6,24})/i,
          /^(\d{8,20})$/
        ];
        for (const p of patterns) {
          const match = data.match(p);
          if (match) {
            const val = (match[1] || match[0]).replace(/[\s\-]/g, '').trim();
            if (val.length >= 6 && val.length <= 24) return val;
          }
        }
        return '';
      }

      window.showCard = function(id) {
        if (isEditMode) return;
        
        const card = cards.find(c => c.id === id); if (!card) return;
        currentViewingCardId = id;
        
        if (card.data && card.data.match(/^https?:\/\//i)) {
          window.open(card.data, '_blank');
          return;
        }
        
        document.getElementById('modalType').innerText = card.type === 'order' ? '🍽️ 餐廳落單' : '🪪 會員卡';
        document.getElementById('modalName').innerText = card.name;
        document.getElementById('modalNumber').innerText = card.number || '無編號';
        document.getElementById('modalData').innerText = card.data;
        document.getElementById('modalIcon').innerHTML = card.iconBase64 
          ? `<img src="${card.iconBase64}" class="w-full h-full object-cover">` : getEmoji(card.name);

        const qrcodeContainer = document.getElementById('qrcode');
        qrcodeContainer.innerHTML = ''; 
        new QRCode(qrcodeContainer, {
          text: card.data, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H
        });

        const safariBtn = document.getElementById('safariBtn');
        safariBtn.classList.add('hidden');

        document.getElementById('deleteBtn').onclick = () => {
          if(confirm('確定刪除此項目？')) { cards = cards.filter(c => c.id !== id); saveCards(); closeModal('qrModal'); renderList(); }
        };
        openModal('qrModal');
      };

      window.openAddModal = function() {
        editingCardId = null;
        document.getElementById('addModalTitle').innerText = '✨ 新增項目';
        document.getElementById('saveCardBtn').innerText = '儲存';
        document.getElementById('addType').value = currentFilter;
        document.getElementById('addName').value = '';
        document.getElementById('addNumber').value = '';
        document.getElementById('addData').value = '';
        clearIcon();
        openModal('addModal');
      };

      window.saveCard = function() {
        const type = document.getElementById('addType').value;
        const name = document.getElementById('addName').value.trim();
        const number = document.getElementById('addNumber').value.trim();
        const data = document.getElementById('addData').value.trim();
        if (!name || !data) return alert('名稱同QR內容都要填！');
        
        if (editingCardId) {
          const cardIndex = cards.findIndex(c => c.id === editingCardId);
          if (cardIndex !== -1) {
            cards[cardIndex].type = type;
            cards[cardIndex].name = name;
            cards[cardIndex].number = number;
            cards[cardIndex].data = data;
            cards[cardIndex].iconBase64 = currentBase64Icon;
          }
        } else {
          const maxOrder = Math.max(...cards.filter(c => c.type === type).map(c => c.order || 0), -1);
          cards.unshift({
            id: 'item_' + Date.now().toString(36),
            type,
            name,
            number,
            data,
            iconBase64: currentBase64Icon,
            createdAt: Date.now(),
            order: maxOrder + 1
          });
        }
        
        saveCards();
        closeAddModal();
        renderList(type);
      };

      window.scanQRFromImage = function(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.getElementById('qrCanvas'); const ctx = canvas.getContext('2d');
            let w = img.width, h = img.height;
            const max = 1000;
            if (w > max || h > max) { const ratio = Math.min(max/w, max/h); w = Math.round(w*ratio); h = Math.round(h*ratio); }
            canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) { 
              document.getElementById('addData').value = code.data;
              const extracted = extractNumber(code.data);
              if (extracted) {
                document.getElementById('addNumber').value = extracted;
                const numInput = document.getElementById('addNumber');
                numInput.classList.add('bg-sky-500/20');
                setTimeout(() => numInput.classList.remove('bg-sky-500/20'), 600);
              }
            } else { alert('❌ 讀唔到QR Code，請試第二張。'); }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file); event.target.value = '';
      };

      window.openModal = function(id) {
        const modal = document.getElementById(id);
        modal.classList.remove('hidden');
        modal.classList.add('modal-active');
      };
      window.closeModal = function(id) {
        const modal = document.getElementById(id);
        modal.classList.remove('modal-active');
        modal.classList.add('hidden');
        if (id === 'qrModal') {
          currentViewingCardId = null;
        }
      };
      
      window.closeAddModal = function() {
        closeModal('addModal');
        editingCardId = null;
        document.getElementById('addModalTitle').innerText = '✨ 新增項目';
        document.getElementById('saveCardBtn').innerText = '儲存';
      };

      window.renderList();
    })();
  </script>
</body>
</html>
