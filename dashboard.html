<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/190.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/512.png">
    <meta name="theme-color" content="#000000">

    <title>Traffic Dashboard</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pb-10 relative bg-gray-50 dark:bg-[#000000] text-gray-900 dark:text-white transition-colors duration-300">

    <!-- 右上角按鈕：跟隨安全區域頂部，但略微上移一點點 -->
    <div class="absolute right-4 z-10 flex gap-2" style="top: env(safe-area-inset-top, 8px); right: max(16px, env(safe-area-inset-right, 16px));">
        <button onclick="openSystemSettings()" class="bg-white/80 dark:bg-black/50 backdrop-blur border border-gray-200 dark:border-gray-700 p-1 rounded-full shadow-sm text-sm w-7 h-7 flex items-center justify-center transition-colors" title="系統設定">⚙️</button>
        <button onclick="toggleTheme()" class="bg-white/80 dark:bg-black/50 backdrop-blur border border-gray-200 dark:border-gray-700 p-1 rounded-full shadow-sm text-sm w-7 h-7 flex items-center justify-center transition-colors">
            <span id="theme-icon"></span>
        </button>
    </div>

    <!-- 頂部佔位高度：與安全區域一致，讓內容整體下移 -->
    <div style="height: env(safe-area-inset-top, 12px);"></div>

    <div class="max-w-[430px] mx-auto px-4 space-y-4">

        <!-- 天氣卡片 -->
        <div class="bg-gradient-to-b from-blue-50 to-white dark:from-[#1c2a3d] dark:to-[#121a2f] rounded-2xl p-4 border border-blue-100 dark:border-gray-700 shadow-lg relative transition-colors duration-300">
            <div class="flex justify-between items-center mb-3 border-b border-gray-200 dark:border-gray-700/60 pb-2">
                <div class="text-xs text-gray-500 dark:text-gray-400 font-medium tracking-wider" id="current-time">載入時間中...</div>
                <div class="flex items-center gap-2">
                    <div id="weather-warning-icon" class="hidden cursor-pointer active:scale-95 transition-transform" onclick="openWarningModal()">
                        <span class="bg-[#ff453a]/10 dark:bg-[#ff453a]/20 text-[#ff453a] border border-[#ff453a]/50 px-2 py-0.5 rounded-full text-[10px] font-bold flex items-center gap-1 animate-pulse shadow-[0_0_8px_rgba(255,69,58,0.3)]">⚠️ 警告生效</span>
                    </div>
                    <div class="bg-white/60 dark:bg-[#3a3a3c] border border-gray-200 dark:border-gray-700/50 px-2 py-1 rounded text-xs flex items-center gap-1 cursor-pointer active:bg-gray-200 dark:active:bg-gray-600 transition-colors" onclick="fetchWeather(); event.stopPropagation();">
                        <span id="weather-refresh-time" class="text-gray-600 dark:text-gray-300">--:--</span> 🔄
                    </div>
                </div>
            </div>
            <div class="flex items-stretch gap-4">
                <div class="flex-shrink-0 flex flex-col items-center w-[90px] border-r border-gray-200 dark:border-gray-700 pr-2">
                    <div class="text-sm text-gray-800 dark:text-gray-300 font-medium" id="weather-location">香港</div>
                    <div class="flex items-start mt-1">
                        <span class="text-4xl font-bold leading-none tracking-tighter text-gray-900 dark:text-white" id="weather-temp">--</span>
                        <span class="text-lg leading-none mt-1 ml-0.5 text-gray-900 dark:text-white">°C</span>
                    </div>
                    <div class="text-3xl my-2" id="weather-icon">☁️</div>
                    <div class="text-[10px] font-bold text-gray-800 dark:text-white" id="weather-min-max"> --°C / --°C</div>
                    <div class="text-[10px] text-gray-500 dark:text-gray-400 font-medium text-center space-y-0.5 w-full" id="weather-details">
                        <div>濕度 --%</div>
                    </div>
                </div>
                <div class="flex-1 space-y-3 h-[150px] overflow-y-auto pl-1 pr-2 scroll-area">
                    <div>
                        <div class="text-blue-600 dark:text-[#64d2ff] font-bold text-[10px] uppercase tracking-widest mb-1">現時天氣</div>
                        <div class="text-[11px] text-gray-700 dark:text-gray-300 leading-relaxed text-justify" id="weather-desc">載入中...</div>
                    </div>
                    <div>
                        <div class="text-blue-600 dark:text-[#64d2ff] font-bold text-[10px] uppercase tracking-widest mb-1">天氣預測</div>
                        <div class="text-[11px] text-gray-700 dark:text-gray-300 leading-relaxed text-justify" id="weather-forecast">載入中...</div>
                    </div>
                    <div>
                        <div class="text-blue-600 dark:text-[#64d2ff] font-bold text-[10px] uppercase tracking-widest mb-1">九天天氣展望</div>
                        <div class="text-[11px] text-gray-700 dark:text-gray-300 leading-relaxed text-justify" id="weather-outlook">載入中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 特別交通消息 -->
        <div class="glass-panel bg-white/80 dark:bg-[#1e1e1e]/80 rounded-2xl p-3 border border-gray-200 dark:border-gray-800 shadow-sm dark:shadow-none transition-colors duration-300">
            <div class="flex justify-between items-center mb-2 px-1">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-900 dark:text-white">🚦 <span class="text-[#ff9f0a]">特別交通消息</span></h2>
                <div class="bg-gray-100 dark:bg-[#3a3a3c] px-2 py-1 rounded text-xs flex items-center gap-1 cursor-pointer active:bg-gray-200 dark:active:bg-gray-600 transition-colors" onclick="fetchTrafficNews(); event.stopPropagation();">
                    <span id="traffic-refresh-time" class="text-gray-600 dark:text-gray-300">--:--</span> 🔄
                </div>
            </div>
            <div class="bg-gray-50 dark:bg-[#1c1c1e] rounded-xl p-3 border border-gray-200 dark:border-gray-800 cursor-pointer active:bg-gray-100 dark:active:bg-[#2c2c2e] transition-colors" onclick="openTrafficModal()">
                <p id="traffic-news-preview" class="text-xs text-gray-700 dark:text-gray-300 leading-relaxed line-clamp-3">載入中...</p>
                <div class="text-right mt-1.5" id="traffic-read-more" style="display: none;">
                    <span class="text-[10px] text-blue-600 dark:text-blue-400 font-medium" id="traffic-read-more-text">點擊閱讀全文 👉</span>
                </div>
            </div>
        </div>

        <!-- 輕鐵 -->
        <div class="glass-panel bg-white/80 dark:bg-[#1e1e1e]/80 rounded-2xl p-3 border border-gray-200 dark:border-gray-800 shadow-sm dark:shadow-none transition-colors duration-300">
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="flex items-center gap-2 cursor-pointer flex-1" onclick="toggleLRT()">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">輕鐵</h2>
                    <span id="lrt-toggle-icon" class="text-xs transition-transform duration-300 text-gray-500">▼</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 px-2.5 py-1 rounded-full text-xs" onclick="openSettings(); event.stopPropagation();">⚙️ 設定</button>
                    <div class="bg-gray-100 dark:bg-[#3a3a3c] px-2 py-1 rounded text-xs flex items-center gap-1 cursor-pointer active:bg-gray-200 dark:active:bg-gray-600 transition-colors" onclick="fetchLRTData(); event.stopPropagation();">
                        <span id="lrt-refresh-time" class="text-gray-600 dark:text-gray-300">--:--</span> 🔄
                    </div>
                </div>
            </div>
            <div id="lrt-content" class="collapsible-content">
                <div class="flex items-center gap-2 mb-3 overflow-x-auto pb-1 border-b border-gray-200 dark:border-gray-700" id="lrt-tags-container"></div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <h3 class="font-bold text-md text-blue-600 dark:text-[#64d2ff]" id="lrt-current-station-name">載入中...</h3>
                </div>
                <div class="grid grid-cols-2 gap-3" id="lrt-platforms-container">
                    <div class="text-xs text-gray-500 dark:text-gray-400 col-span-2 text-center py-4">正在連接港鐵伺服器...</div>
                </div>
            </div>
        </div>

        <!-- 港鐵 -->
        <div class="glass-panel bg-white/80 dark:bg-[#1e1e1e]/80 rounded-2xl p-3 border border-gray-200 dark:border-gray-800 shadow-sm dark:shadow-none transition-colors duration-300">
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="flex items-center gap-2 cursor-pointer flex-1" onclick="toggleMTR()">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">港鐵</h2>
                    <span id="mtr-toggle-icon" class="text-xs transition-transform duration-300 text-gray-500">▼</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 px-2.5 py-1 rounded-full text-xs" onclick="openMtrSettings(); event.stopPropagation();">⚙️ 設定</button>
                    <div class="bg-gray-100 dark:bg-[#3a3a3c] px-2 py-1 rounded text-xs flex items-center gap-1 cursor-pointer active:bg-gray-200 dark:active:bg-gray-600 transition-colors" onclick="fetchMTRData(); event.stopPropagation();">
                        <span id="mtr-refresh-time" class="text-gray-600 dark:text-gray-300">--:--</span> 🔄
                    </div>
                </div>
            </div>
            <div id="mtr-content" class="collapsible-content collapsed">
                <div class="flex items-center gap-2 mb-3 overflow-x-auto pb-1 border-b border-gray-200 dark:border-gray-700" id="mtr-tags-container"></div>
                <div class="flex justify-between items-end mb-2 px-1">
                    <h3 class="font-bold text-md text-[#ea2227] dark:text-[#ff4d4d]" id="mtr-current-station-name">載入中...</h3>
                </div>
                <div class="grid grid-cols-2 gap-3" id="mtr-platforms-container">
                    <div class="text-xs text-gray-500 dark:text-gray-400 col-span-2 text-center py-4">正在連接港鐵伺服器...</div>
                </div>
            </div>
        </div>

        <!-- 巴士 / 小巴 -->
        <div class="glass-panel bg-white/80 dark:bg-[#1e1e1e]/80 rounded-2xl p-3 border border-gray-200 dark:border-gray-800 shadow-sm dark:shadow-none transition-colors duration-300">
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="flex items-center gap-2 cursor-pointer flex-1" onclick="toggleKMB()">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">巴士 / 小巴</h2>
                    <span id="kmb-toggle-icon" class="text-xs transition-transform duration-300 text-gray-500">▼</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button class="bg-[#ff453a] text-white font-bold px-2.5 py-1 rounded-full text-xs active:bg-red-700 transition-colors shadow-sm" onclick="openTmClPopup(); event.stopPropagation();">🚌 屯轉</button>
                    <button class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 px-2.5 py-1 rounded-full text-xs" onclick="openKmbSettings(); event.stopPropagation();">⚙️ 設定</button>
                    <div class="bg-gray-100 dark:bg-[#3a3a3c] px-2 py-1 rounded text-xs flex items-center gap-1 cursor-pointer active:bg-gray-200 dark:active:bg-gray-600 transition-colors" onclick="fetchKMBData(); event.stopPropagation();">
                        <span id="kmb-refresh-time" class="text-gray-600 dark:text-gray-300">--:--</span> 🔄
                    </div>
                </div>
            </div>
            <div id="kmb-content" class="collapsible-content collapsed">
                <div id="kmb-container" class="grid grid-cols-2 gap-2.5">
                    <div class="text-xs text-gray-500 dark:text-gray-400 col-span-2 text-center py-4">請前往設定加入巴士或小巴路線。</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 其餘 Modal 與之前相同，省略以節省篇幅，請直接使用先前版本 -->
    <!-- 為保持完整，這裡省略了所有 Modal，但實際應保留全部 -->

    <footer class="mt-6 mb-4">
        <div class="text-[10px] text-gray-500 dark:text-gray-400 font-medium text-center space-y-1 w-full">
            <p>Created by Jason | Version 1.1</p>
        </div>
    </footer>
    <script src="js/api.js">
    </script>
    <script src="js/app.js">
    </script>
    <div style="text-align:center; margin: 16px 0;">
        <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'>
        </script>
        <script type='text/javascript'>
            kofiwidget2.init('Support me on Ko-fi', '#72a4f2', 'B8D5229GWX');
            kofiwidget2.draw();
        </script>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(function(reg) {
                    console.log('✅ Service Worker 註冊成功 (Scope:', reg.scope, ')');
                })
                .catch(function(err) {
                    console.warn('⚠️ Service Worker 註冊失敗:', err);
                });
        }
    </script>

</body>
</html>
